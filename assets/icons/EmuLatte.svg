  <path d="M 256 140 C 246 105 266 80 256 50"  fill="none" stroke="#FFE6A7" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  <path d="M 292 140 C 282 110 302 90 292 65" fill="none" stroke="#FFE6A7" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
