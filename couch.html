<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>EmuLatte — Couch Mode</title>
  <style>
    /* Raleway bundled locally (same files as CREMA / desktop EmuLatte) */
    @font-face { font-family: 'Raleway'; src: url('assets/fonts/Raleway-Regular.ttf') format('truetype'); font-weight: 400; }
    @font-face { font-family: 'Raleway'; src: url('assets/fonts/Raleway-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'Raleway'; src: url('assets/fonts/Raleway-Black.ttf') format('truetype'); font-weight: 900; }
    :root {
      --bg: #1c120d; --bg_panel: #2a1c14; --bg_menu: #241813;
      --accent: #d4a373; --accent_menu: #d4a373;
      --text_main: #e8d9c5; --text_sec: #c9b8a3; --text_dim: #9c8674;
      --border: rgba(212,163,115,0.18); --border_solid: #8B5A2B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text_main); font-family: 'Raleway', system-ui, sans-serif; user-select: none; overflow: hidden; }
    button { font-family: inherit; cursor: pointer; }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; }
    .screen.hidden { display: none; }
    .prompts { flex-shrink: 0; display: flex; gap: 24px; align-items: center; justify-content: center; padding: 9px 26px;
               background: var(--bg_menu); border-top: 1px solid rgba(212,163,115,0.18); font-size: 12px; font-weight: 800; letter-spacing: 1px; color: var(--text_sec); }
    .prompts .pk { display: inline-flex; align-items: center; gap: 8px; }
    .pb { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 900; color: var(--bg); }
    .pb.a { background: #6cc24a; } .pb.b { background: #e05a4f; } .pb.y { background: #f4c430; } .pb.x { background: #4a90d9; }
    .pb.lr { background: var(--text_sec); border-radius: 6px; padding: 0 8px; }
    /* masked gamepad glyphs (CREMA assets/gamepad_icons, layout-switchable + theme-tinted) */
    .gp-glyph { display: inline-block; width: 1.6em; height: 1.6em; vertical-align: middle; margin: 0 1px; background-color: var(--accent);
                -webkit-mask-size: contain; -webkit-mask-position: center; -webkit-mask-repeat: no-repeat; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); }

    /* ── START: carousel ── */
    #screen-start { background: var(--bg); }
    #cz-hero { flex: 1; position: relative; overflow: hidden; perspective: 1200px; }
    #cz-hero-fallback { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: clamp(40px,8vw,96px); font-weight: 900; letter-spacing: 4px; color: rgba(212,163,115,0.18); display: none; }
    #cz-hero-title { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; pointer-events: none;
                     font-size: clamp(40px, 7vw, 108px); font-weight: 900; letter-spacing: 4px; color: #fff; text-align: center; padding: 0 6%;
                     text-shadow: 0 4px 30px rgba(0,0,0,0.95), 0 0 70px rgba(0,0,0,0.85); }
    .hero-mosaic { position: absolute; inset: 0; display: none; }
    .mosaic-img { position: absolute; border-radius: 12px; border: 3px solid rgba(212,163,115,0.5); box-shadow: 0 20px 30px rgba(0,0,0,0.8); object-fit: cover; opacity: 0; transition: all 0.6s cubic-bezier(0.2,0.8,0.2,1); }
    .mosaic-img.show { opacity: 1; }
    .mosaic-img:nth-child(1) { top: 6%; left: 4%; width: 42%; height: 72%; z-index: 1; transform: translate3d(-24px,-24px,-50px) rotate(-3deg); }
    .mosaic-img.show:nth-child(1) { transform: translate3d(0,0,0) rotate(-3deg); }
    .mosaic-img:nth-child(2) { bottom: 8%; right: 4%; width: 42%; height: 72%; z-index: 2; transform: translate3d(24px,24px,-30px) rotate(2deg); }
    .mosaic-img.show:nth-child(2) { transform: translate3d(0,0,0) rotate(2deg); }
    .mosaic-img:nth-child(3) { top: 8%; left: 29%; width: 42%; height: 78%; z-index: 3; border-color: var(--accent); transform: translate3d(0,50px,50px) scale(0.92); }
    .mosaic-img.show:nth-child(3) { transform: translate3d(0,0,50px) scale(1.04); box-shadow: 0 30px 44px rgba(0,0,0,0.9); }

    /* ── START: tiles ── */
    #cz-tiles { flex: 1; min-height: 0; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); grid-auto-rows: max-content; gap: 18px; padding: 26px; align-content: start; }
    .cz-tile { position: relative; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; border: 2px solid transparent; background: var(--bg_panel);
               content-visibility: auto; contain-intrinsic-size: auto 230px auto 130px; transition: border-color .12s, transform .12s, box-shadow .12s; }
    .cz-tile.sel { border-color: #fff; box-shadow: 0 0 24px rgba(212,163,115,0.5); transform: scale(1.03); z-index: 2; }
    .cz-tile-bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
    .cz-tile-grad { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.1) 75%); }
    .cz-tile-label { position: absolute; bottom: 12px; left: 14px; right: 14px; font-size: 17px; font-weight: 900; letter-spacing: 1px; color: #fff; text-shadow: 0 2px 6px #000; }
    .cz-tile-count { position: absolute; top: 10px; right: 12px; font-size: 11px; font-weight: 900; color: var(--accent); background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 10px; }

    /* ── GALLERY (CREMA gallery-screen, exact CSS, kept fluid) ── */
    #screen-wall { padding: 0; }
    #screen-wall > .prompts { position: relative; z-index: 2; }   /* sit above #gallery-bg-grad (z1) */
    #gallery-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
    #gallery-bg-img { display: none; }
    #gallery-bg-grad { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.78) 35%, rgba(0,0,0,0.97) 100%); z-index: 1; pointer-events: none; }
    #gallery-hero { position: relative; z-index: 2; height: 265px; flex-shrink: 0; overflow: hidden; margin: 20px 70px 14px; border-radius: 12px; border: 1px solid var(--border_solid); background: var(--bg_panel); }
    #gallery-hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #gallery-hero-grad { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.15) 45%, rgba(0,0,0,0.92) 100%); z-index: 1; pointer-events: none; }
    #gallery-header { position: absolute; top: 0; left: 0; right: 0; z-index: 2; display: flex; align-items: center; gap: 16px; padding: 18px 22px 10px; }
    #gallery-cat-name { font-size: 26px; font-weight: 900; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,1); }
    #gallery-search-tag { font-size: 16px; color: rgba(255,255,255,0.75); font-style: italic; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
    #gallery-count { position: absolute; bottom: 16px; left: 22px; z-index: 2; font-size: 14px; font-weight: 900; color: var(--text_dim); letter-spacing: 2px; text-shadow: 0 2px 8px rgba(0,0,0,1); }
    #gallery-hero-game-name { position: absolute; bottom: 16px; right: 22px; z-index: 2; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 0 2px 14px rgba(0,0,0,1); text-align: right; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #gallery-hero-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; max-width: 55%; max-height: 50%; object-fit: contain; display: none; filter: drop-shadow(0 4px 24px rgba(0,0,0,0.95)); }
    #gallery-scroll { position: relative; z-index: 2; flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; }
    #gallery-scroll::-webkit-scrollbar { width: 0; }
    /* auto-fill columns so the count adapts to the window (≈9 on large screens, ≈5 on smaller); cards keep a square cover */
    #gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); grid-auto-rows: max-content; gap: 16px; padding: 22px 70px; align-content: start; }
    .gallery-section-header { grid-column: 1 / -1; font-size: 12px; font-weight: 900; letter-spacing: 3px; padding: 6px 10px; border-radius: 4px; min-height: 30px; display: flex; align-items: center; background: var(--bg_panel); color: var(--text_dim); border: 1px solid var(--border_solid); }
    .gcell { display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; border: 3px solid transparent; transition: transform 0.13s ease, border-color 0.13s ease, box-shadow 0.13s ease; background: var(--bg_panel); cursor: pointer; content-visibility: auto; contain-intrinsic-size: auto 230px; }
    .gcell-cover-area { width: 100%; aspect-ratio: 1 / 1; flex: none; position: relative; overflow: hidden; }   /* fixed square, never squished */
    .gcell-cover-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gcell-shot-grad { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(0,0,0,0.42) 0%, transparent 68%), linear-gradient(to top, rgba(0,0,0,0.5), transparent 55%); }
    .gcell-cover-area img.gcell-logo { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 84%; height: 62%; object-fit: contain; filter: drop-shadow(0 3px 12px rgba(0,0,0,0.92)); }
    .gcell-footer { height: 46px; flex-shrink: 0; padding: 5px 8px; display: flex; flex-direction: column; justify-content: center; gap: 3px; background: var(--bg_panel); }
    .gcell-title { font-size: 11px; font-weight: bold; color: var(--text_sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gcell-footer-row { display: flex; align-items: center; justify-content: space-between; }
    .gcell-play-btn { border: none; border-radius: 3px; font-size: 9px; font-weight: 900; padding: 2px 7px; letter-spacing: 1px; }
    .gcell-installed-btn { background: var(--accent); color: rgba(0,0,0,0.85); }
    .gcell.selected { border-color: var(--accent); transform: scale(1.10); box-shadow: 0 0 18px var(--accent), 0 8px 24px rgba(0,0,0,0.85); z-index: 10; }
    .couch-empty { grid-column: 1/-1; text-align: center; padding: 80px; color: var(--text_dim); font-size: 16px; font-weight: 900; letter-spacing: 2px; }

    /* ── "No artwork" placeholder (big/bold/stylish, scales to its box via container queries) ── */
    .art-ph { container-type: size; position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4cqh; text-align: center; padding: 8% 7%; overflow: hidden;
              background: radial-gradient(120% 90% at 50% 22%, color-mix(in srgb, var(--accent) 26%, var(--bg_panel)) 0%, var(--bg_panel) 48%, var(--bg) 100%); }
    .art-ph::before { content: ""; position: absolute; inset: -20%; z-index: 0; opacity: 0.08; pointer-events: none;
                      background: repeating-linear-gradient(135deg, var(--accent) 0 2px, transparent 2px 22px); }
    .art-ph::after  { content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none; box-shadow: inset 0 0 0 2px var(--border); border-radius: inherit; }
    .art-ph > * { position: relative; z-index: 1; }
    .art-ph-eyebrow { font-size: clamp(8px, 6cqh, 18px); font-weight: 900; letter-spacing: 0.32em; text-transform: uppercase; color: var(--accent); opacity: 0.85; }
    .art-ph-title { font-weight: 900; line-height: 0.98; letter-spacing: -0.01em; color: var(--text_main); text-shadow: 0 3px 22px rgba(0,0,0,0.55);
                    font-size: min(26cqh, 19cqw); display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .art-ph-cta { display: inline-flex; align-items: center; gap: 0.5em; margin-top: 1cqh; font-size: clamp(8px, 6.5cqh, 17px); font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase;
                  color: var(--bg); background: var(--accent); padding: 0.55em 1.1em; border-radius: 999px; box-shadow: 0 6px 20px rgba(0,0,0,0.45); }
    .art-ph-cta .x { display: inline-flex; align-items: center; justify-content: center; min-width: 1.5em; height: 1.5em; border-radius: 50%; background: rgba(0,0,0,0.28); }

    /* scrape progress overlay (reuses couch-now look) */
    #couch-now.scraping .now-art { display: flex; align-items: center; justify-content: center; background: var(--bg_panel); }
    #couch-now.scraping .now-art::after { content: "⟳"; font-size: 64px; color: var(--accent); animation: cn-spin 1s linear infinite; }
    @keyframes cn-spin { to { transform: rotate(360deg); } }

    /* ── GAMEPAGE ── */
    #gp-hero { position: relative; height: 42vh; flex-shrink: 0; background: var(--bg_menu); overflow: hidden; }
    #gp-hero-img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; }
    #gp-hero-grad { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, rgba(0,0,0,0.94) 0%, rgba(0,0,0,0.5) 60%, transparent 100%); z-index: 1; pointer-events: none; }
    #gp-logo { position: absolute; top: 46%; left: 50%; transform: translate(-50%,-50%); z-index: 2; max-width: 56%; max-height: 50%; object-fit: contain; display: none; filter: drop-shadow(0 5px 24px rgba(0,0,0,0.95)); }
    #gp-hero-title { position: absolute; top: 46%; left: 50%; transform: translate(-50%,-50%); z-index: 2; font-size: clamp(28px,4vw,52px); font-weight: 900; color: #fff; text-shadow: 0 4px 20px #000; text-align: center; max-width: 80%; }
    #gp-actions { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3; display: flex; align-items: center; gap: 12px; padding: 18px 40px; }
    .gp-btn { background: rgba(0,0,0,0.55); border: 2px solid rgba(255,255,255,0.22); color: #fff; padding: 11px 22px; border-radius: 9px; font-weight: 900; letter-spacing: 1px; font-size: 14px; backdrop-filter: blur(6px); transition: transform .12s, border-color .12s, box-shadow .12s; white-space: nowrap; }
    .gp-btn.active { border-color: var(--accent); color: var(--accent); }
    .gp-btn.gp-focus { border-color: #fff; transform: scale(1.07); box-shadow: 0 0 16px rgba(255,255,255,0.4); }
    .gp-btn.play { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .gp-btn.play.gp-focus { box-shadow: 0 0 22px var(--accent); }
    #gp-content { flex: 1; min-height: 0; overflow-y: auto; display: flex; gap: 26px; padding: 24px 40px 30px; align-items: flex-start; }
    #gp-cover { position: relative; width: 220px; aspect-ratio: 2/3; flex-shrink: 0; border-radius: 10px; overflow: hidden; border: 1px solid rgba(212,163,115,0.25); background: var(--bg_panel); }
    #gp-cover img { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; }
    #gp-left { flex: 1; min-width: 0; }
    #gp-ss { position: relative; height: 200px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(212,163,115,0.2); margin-bottom: 22px; display: none; }
    #gp-ss img { width: 100%; height: 100%; object-fit: cover; }
    #gp-desc { font-size: 16px; line-height: 1.7; color: var(--text_sec); }
    #gp-right { width: 250px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
    .gp-stat { display: flex; justify-content: space-between; gap: 12px; padding: 9px 14px; background: rgba(0,0,0,0.25); border: 1px solid rgba(212,163,115,0.15); border-radius: 8px; font-size: 13px; }
    .gp-stat .k { color: var(--text_dim); font-weight: 800; letter-spacing: 1px; }
    .gp-stat .v { color: var(--text_main); font-weight: 700; text-align: right; }

    /* ── LIST VIEW (CREMA main-screen, exact CSS, kept fluid) ── */
    #screen-list { padding: 40px; }
    .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--border); padding-bottom: 18px; margin-bottom: 18px; flex-shrink: 0; }
    .header-title { display: flex; align-items: center; gap: 20px; font-size: 44px; font-weight: bold; margin: 0; color: var(--text_main); }
    .header-brand { color: var(--text_dim); font-size: 14px; font-weight: bold; letter-spacing: 2px; }
    .main-container { display: flex; flex: 1; min-height: 0; gap: 36px; overflow: hidden; }
    .list-view { flex: 3; display: flex; flex-direction: column; overflow-y: scroll; scrollbar-width: none; }
    .list-view::-webkit-scrollbar { display: none; }
    .game-item { padding: 14px 20px; font-size: 26px; color: var(--text_sec); border-radius: 8px; margin-bottom: 5px; transition: all 0.1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; line-height: 1.2; }
    .game-item.selected { background-color: var(--border); color: var(--text_main); font-weight: bold; border-left: 8px solid var(--accent); }
    .list-install-dot { font-size: 9px; margin-right: 6px; color: #66bb6a; }
    .details-view { flex: 5; display: flex; flex-direction: column; gap: 20px; min-height: 0; }
    .image-container { flex: 1; min-height: 0; background-color: var(--bg_panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; display: flex; justify-content: center; align-items: center; }
    .media-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; opacity: 0; pointer-events: none; }
    .media-layer.active { opacity: 1; }
    .cover-art-overlay { position: absolute; bottom: 20px; left: 20px; width: 140px; height: 210px; border: 3px solid var(--accent); border-radius: 4px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.8); z-index: 10; transition: opacity 0.5s ease; opacity: 1; }
    .cover-art-overlay.hidden { opacity: 0; }
    #list-media-topgrad { position: absolute; top: 0; left: 0; right: 0; height: 46%; z-index: 4; pointer-events: none; display: none; background: linear-gradient(to bottom, rgba(0,0,0,0.78) 0%, transparent 100%); }
    #list-logo { position: absolute; top: 18px; left: 50%; transform: translateX(-50%); max-width: 64%; max-height: 34%; object-fit: contain; z-index: 5; display: none; filter: drop-shadow(0 3px 14px rgba(0,0,0,0.92)); }
    .desc-box { font-size: 24px; color: var(--text_sec); line-height: 1.5; overflow: hidden; flex-shrink: 0; max-height: 33%; }
    .stats-view { flex: 2; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .stat-box { background-color: var(--bg_panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; min-width: 0; overflow: hidden; }
    .stat-title { color: var(--text_dim); font-size: 16px; font-weight: bold; letter-spacing: 1px; margin-bottom: 2px; }
    .stat-val { color: var(--text_main); font-size: 20px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-dock { flex: 1; background-color: var(--bg_panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; display: flex; justify-content: center; align-items: center; min-height: 90px; }
    .mini-prompt { color: var(--text_dim); font-size: 20px; font-weight: bold; text-align: center; padding: 20px; }

    /* ── Settings menu overlay (CREMA, exact visuals) ── */
    #overlay-backdrop { position: absolute; inset: 0; z-index: 60; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.35); }
    #overlay-backdrop.hidden { display: none; }
    .overlay-modal { background-color: var(--bg_menu); border: 2px solid var(--border_solid); border-radius: 15px; width: 600px; max-width: 92vw; padding: 30px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
    #overlay-title { font-size: 36px; font-weight: bold; color: var(--text_main); text-align: center; margin-bottom: 30px; flex-shrink: 0; }
    #overlay-list { display: flex; flex-direction: column; max-height: 55vh; overflow-y: auto; scrollbar-width: none; }
    #overlay-list::-webkit-scrollbar { display: none; }
    .overlay-section { font-size: 11px; font-weight: bold; color: var(--text_sec); padding: 16px 20px 4px; text-align: center; letter-spacing: 4px; opacity: 0.75; pointer-events: none; }
    .overlay-item { font-size: 26px; color: var(--text_sec); padding: 20px; border-bottom: 1px solid var(--border_solid); text-align: center; }
    .overlay-item.selected { font-size: 32px; font-weight: bold; background-color: var(--border_solid); color: var(--text_main); border-radius: 8px; }
    #overlay-hint { text-align: center; color: var(--text_dim); font-size: 14px; margin-top: 25px; opacity: 0.7; line-height: 1.5; flex-shrink: 0; }

    /* ── OSK search (CREMA on-screen keyboard) ── */
    #osk-backdrop { position: absolute; inset: 0; z-index: 70; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); }
    #osk-backdrop.hidden { display: none; }
    .osk-modal { width: min(800px, 92vw); text-align: center; }
    #osk-title { font-size: 36px; font-weight: bold; color: var(--text_main); text-align: center; margin-bottom: 10px; }
    #osk-query { font-size: 32px; color: var(--accent); margin-bottom: 20px; min-height: 42px; border-bottom: 2px solid var(--border_solid); display: inline-block; min-width: 50%; }
    #osk-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; justify-content: center; }
    .osk-key { padding: 15px 5px; font-size: 24px; font-weight: bold; border-radius: 8px; color: var(--text_sec); background: var(--bg_panel); }
    .osk-key.sel { background: var(--accent); color: var(--bg); transform: scale(1.1); box-shadow: 0 0 15px var(--accent); }
    #osk-hint { margin-top: 20px; color: var(--text_dim); font-size: 18px; }

    /* ── Now Launching ── */
    #couch-now { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; background: rgba(10,6,4,0.82); backdrop-filter: blur(8px); transition: opacity .25s; }
    #couch-now.hidden { opacity: 0; pointer-events: none; }
    .now-art { width: 460px; max-width: 80vw; aspect-ratio: 16/9; background-size: cover; background-position: center; border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); border: 1px solid rgba(212,163,115,0.3); }
    .now-box { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .now-label { font-size: 12px; font-weight: 900; letter-spacing: 5px; color: var(--accent); }
    .now-title { font-size: clamp(22px, 4vw, 40px); font-weight: 900; color: #fff; text-align: center; max-width: 80vw; }
  </style>
</head>
<body>
  <!-- ── START SCREEN ── -->
  <div id="screen-start" class="screen">
    <div id="cz-hero">
      <div id="cz-hero-fallback">EMULATTE</div>
      <div class="hero-mosaic" id="cz-mosaic"></div>
      <div id="cz-hero-title"></div>
    </div>
    <div id="cz-tiles" style="display:none;"></div>
    <footer class="prompts">
      <span class="pk"><span class="gp-glyph" data-btn="SOUTH"></span> Open</span>
      <span class="pk"><span class="gp-glyph" data-btn="EAST"></span> Exit</span>
      <span class="pk"><span class="gp-glyph" data-btn="NORTH"></span> Carousel / Tiles</span>
      <span class="pk"><span class="gp-glyph" data-btn="dpad_left"></span><span class="gp-glyph" data-btn="dpad_right"></span> Browse</span>
    </footer>
  </div>

  <!-- ── WALL ── -->
  <div id="screen-wall" class="screen hidden">
    <div id="gallery-bg"><img id="gallery-bg-img" src="" alt=""></div>
    <div id="gallery-bg-grad"></div>
    <div id="gallery-hero">
      <img id="gallery-hero-img" src="" alt="">
      <div id="gallery-hero-grad"></div>
      <div id="gallery-header">
        <div id="gallery-cat-name"></div>
        <div id="gallery-search-tag"></div>
      </div>
      <img id="gallery-hero-logo" src="" alt="">
      <div id="gallery-count"></div>
      <div id="gallery-hero-game-name"></div>
    </div>
    <div id="gallery-scroll"><div id="gallery-grid"></div></div>
    <footer class="prompts">
      <span class="pk"><span class="gp-glyph" data-btn="dpad_up"></span><span class="gp-glyph" data-btn="dpad_down"></span><span class="gp-glyph" data-btn="dpad_left"></span><span class="gp-glyph" data-btn="dpad_right"></span> Move</span>
      <span class="pk"><span class="gp-glyph" data-btn="L1"></span><span class="gp-glyph" data-btn="R1"></span> Category</span>
      <span class="pk"><span class="gp-glyph" data-btn="SOUTH"></span> Open</span>
      <span class="pk"><span class="gp-glyph" data-btn="EAST"></span> Back</span>
      <span class="pk"><span class="gp-glyph" data-btn="NORTH"></span> Search</span>
      <span class="pk"><span class="gp-glyph" data-btn="WEST"></span> Scrape</span>
      <span class="pk"><span class="gp-glyph" data-btn="SELECT"></span> Sort</span>
    </footer>
  </div>

  <!-- ── GAMEPAGE ── -->
  <div id="screen-gamepage" class="screen hidden">
    <div id="gp-hero">
      <img id="gp-hero-img" src="" alt="">
      <div id="gp-hero-ph"></div>
      <div id="gp-hero-grad"></div>
      <img id="gp-logo" src="" alt="">
      <div id="gp-hero-title"></div>
      <div id="gp-actions"></div>
    </div>
    <div id="gp-content">
      <div id="gp-cover"></div>
      <div id="gp-left">
        <div id="gp-ss"><img src="" alt=""></div>
        <div id="gp-desc"></div>
      </div>
      <div id="gp-right"></div>
    </div>
    <footer class="prompts">
      <span class="pk"><span class="gp-glyph" data-btn="SOUTH"></span> Select</span>
      <span class="pk"><span class="gp-glyph" data-btn="EAST"></span> Back</span>
      <span class="pk"><span class="gp-glyph" data-btn="dpad_left"></span><span class="gp-glyph" data-btn="dpad_right"></span> Actions</span>
    </footer>
  </div>

  <!-- ── LIST VIEW ── -->
  <div id="screen-list" class="screen hidden">
    <div class="header">
      <h1 class="header-title" id="list-cat-name">ALL GAMES</h1>
      <div class="header-brand" id="list-count"></div>
    </div>
    <div class="main-container">
      <div class="list-view" id="game-list"></div>
      <div class="details-view">
        <div class="image-container" id="media-container">
          <img id="screenshot-player" class="media-layer" alt="">
          <img id="cover-backdrop" class="media-layer" alt="">
          <div id="list-media-topgrad"></div>
          <img id="list-logo" alt="">
          <img id="cover-mini" class="cover-art-overlay hidden" alt="">
          <div id="list-noart" style="display:none;"></div>
        </div>
        <div class="desc-box" id="game-desc"></div>
      </div>
      <div class="stats-view">
        <div class="stat-box"><div class="stat-title">SYSTEM</div><div class="stat-val" id="stat-system">--</div></div>
        <div class="stat-box"><div class="stat-title">RELEASED</div><div class="stat-val" id="stat-release">--</div></div>
        <div class="stat-box"><div class="stat-title">DEVELOPER</div><div class="stat-val" id="stat-dev">--</div></div>
        <div class="stat-box"><div class="stat-title">PUBLISHER</div><div class="stat-val" id="stat-pub">--</div></div>
        <div class="stat-box"><div class="stat-title">GENRE</div><div class="stat-val" id="stat-genre">--</div></div>
        <div class="stat-box"><div class="stat-title">PLAYERS</div><div class="stat-val" id="stat-players">--</div></div>
        <div class="mini-dock" id="mini-dock"><div id="mini-prompt" class="mini-prompt"><span class="gp-glyph" data-btn="SOUTH"></span> PLAY</div></div>
      </div>
    </div>
    <footer class="prompts">
      <span class="pk"><span class="gp-glyph" data-btn="dpad_up"></span><span class="gp-glyph" data-btn="dpad_down"></span> Browse</span>
      <span class="pk"><span class="gp-glyph" data-btn="L1"></span><span class="gp-glyph" data-btn="R1"></span> Category</span>
      <span class="pk"><span class="gp-glyph" data-btn="SOUTH"></span> Play</span>
      <span class="pk"><span class="gp-glyph" data-btn="EAST"></span> Back</span>
      <span class="pk"><span class="gp-glyph" data-btn="NORTH"></span> Search</span>
      <span class="pk"><span class="gp-glyph" data-btn="WEST"></span> Scrape</span>
      <span class="pk"><span class="gp-glyph" data-btn="SELECT"></span> Sort</span>
    </footer>
  </div>

  <div id="overlay-backdrop" class="hidden">
    <div class="overlay-modal">
      <div id="overlay-title"></div>
      <div id="overlay-list"></div>
      <div id="overlay-hint" style="display:none;"></div>
    </div>
  </div>

  <!-- ── OSK SEARCH (CREMA on-screen keyboard) ── -->
  <div id="osk-backdrop" class="hidden">
    <div class="overlay-modal osk-modal">
      <div id="osk-title">SEARCH</div>
      <div id="osk-query"></div>
      <div id="osk-grid"></div>
      <div id="osk-hint">Press <strong>Y</strong> to clear · <strong>B</strong> to close</div>
    </div>
  </div>

  <div id="couch-now" class="hidden">
    <div class="now-box">
      <div class="now-art"></div>
      <div class="now-label">NOW LAUNCHING</div>
      <div class="now-title"></div>
    </div>
  </div>

  <script src="couch.js"></script>
</body>
</html>
